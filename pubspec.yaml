name: flutter_clean_boilerplate
description: Flutter Clean Architecture Boilerplate
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Functional Programming
  dartz: ^0.10.1

  # Network
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Routing
  go_router: ^13.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  connectivity_plus: ^7.0.0

  # Firebase (optional)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.9
  # firebase_analytics: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

